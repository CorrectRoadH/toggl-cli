name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      TOGGL_API_TOKEN: ${{ secrets.TOGGL_API_TOKEN }}
      TOGGL_TEST_ORGANIZATION_ID: ${{ secrets.TOGGL_TEST_ORGANIZATION_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libssl-dev pkg-config
      - name: Generate coverage report
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Generate coverage summary
        run: cargo llvm-cov report --summary-only > coverage-summary.txt
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            lcov.info
            coverage-summary.txt
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: true
          use_oidc: true

  lints:
    name: Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libssl-dev pkg-config
      - run: cargo fmt --all -- --check
      - run: cargo clippy -- -D warnings
