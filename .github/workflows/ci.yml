name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lints:
    name: Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install build tools
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libdbus-1-dev libssl-dev pkg-config
          version: 1.0
      - run: cargo fmt --all -- --check
      - run: cargo clippy -- -D warnings

  test-and-coverage:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lints
    permissions:
      contents: read
      id-token: write
    env:
      TOGGL_API_URL: ${{ secrets.TOGGL_API_URL }}
      TOGGL_API_TOKEN: ${{ secrets.TOGGL_API_TOKEN }}
      TOGGL_TEST_ORGANIZATION_ID: ${{ secrets.TOGGL_TEST_ORGANIZATION_ID }}
      TOGGL_TEST_WORKSPACE_ID: ${{ secrets.TOGGL_TEST_WORKSPACE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Install build tools
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libdbus-1-dev libssl-dev pkg-config
          version: 1.0
      - name: Run tests
        run: cargo test --locked
      - name: Generate coverage report
        run: cargo llvm-cov --workspace --locked --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: true
          use_oidc: true
